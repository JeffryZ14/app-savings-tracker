version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Lima"
    open-pull-requests-limit: 5
    groups:
      all-npm:
        patterns: [ "*" ]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Lima"
    groups:
      all-actions:
        patterns: [ "*" ]
    labels:
      - "dependencies"
      - "ci"
